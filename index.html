<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>YouTube Player Hub</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #player { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="player"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('id');
        const initialVol = urlParams.get('vol') || 25;

        
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        let player;
        window.onYouTubeIframeAPIReady = function() {
            player = new YT.Player('player', {
                videoId: videoId,
                playerVars: {
                    'autoplay': 1,
                    'controls': 0,
                    'mute': (initialVol == 0 ? 1 : 0),
                    'modestbranding': 1,
                    'rel': 0,
                    'iv_load_policy': 3
                    
                },
                events: {
                    'onReady': (e) => {
                        e.target.setVolume(initialVol);
                        e.target.playVideo();
                    },
                    'onStateChange': (e) => {
                        
                        if (e.data === YT.PlayerState.ENDED) {
                            window.parent.postMessage('videoEnded', '*');
                        }
                    },
                    'onError': () => window.parent.postMessage('videoError', '*')
                }
            });
        };

        
        window.addEventListener('message', (event) => {
            if (!player) return;

            
            if (event.data === 'pause') {
                player.pauseVideo();
            } else if (event.data === 'play') {
                player.playVideo();
            } 
            
            else if (event.data.type === 'setVolume') {
                const newVol = event.data.value;
                player.setVolume(newVol);
                if (newVol > 0) player.unMute(); else player.mute();
            }
        });
    </script>
</body>
</html>
