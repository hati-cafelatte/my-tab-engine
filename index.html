<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #player { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="player"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('id');
        const initialVol = parseInt(urlParams.get('vol')) || 25;

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        let player;
        window.onYouTubeIframeAPIReady = function() {
            player = new YT.Player('player', {
                videoId: videoId,
                playerVars: { 
                    'autoplay': 1, 
                    'controls': 0, 
                    'modestbranding': 1, 
                    'rel': 0,
                    'origin': location.origin 
                },
                events: {
                    'onReady': (e) => {
                        e.target.setVolume(initialVol);
                        // 初回起動時に音が0以外ならミュート解除を試みる
                        if (initialVol > 0) {
                            e.target.unMute();
                        } else {
                            e.target.mute();
                        }
                        e.target.playVideo();
                    },
                    'onStateChange': (e) => {
                        if (e.data === YT.PlayerState.ENDED) window.parent.postMessage('videoEnded', '*');
                    },
                    'onError': () => window.parent.postMessage('videoError', '*')
                }
            });
        };

        window.addEventListener('message', (event) => {
            if (!player || !player.setVolume) return;

            if (event.data === 'pause') {
                player.pauseVideo();
            } else if (event.data === 'play') {
                player.playVideo();
            } else if (typeof event.data === 'number') {
                // ★ ここで音量設定とミュート解除をセットで行う
                const newVol = event.data;
                player.setVolume(newVol);
                if (newVol > 0) {
                    player.unMute(); 
                } else {
                    player.mute();
                }
            }
        });
    </script>
</body>
</html>
