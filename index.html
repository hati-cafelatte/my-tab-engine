<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        /* pointer-events: none; でクリックを無効化し、勝手な操作を防ぐ */
        #player { width: 100vw; height: 100vh; pointer-events: none; }
    </style>
</head>
<body>
    <div id="player"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('id');
        const vol = parseInt(urlParams.get('vol')) || 25;

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        let player;
        window.onYouTubeIframeAPIReady = function() {
            player = new YT.Player('player', {
                videoId: videoId,
                playerVars: { 
                    'autoplay': 1, 'controls': 0, 'modestbranding': 1, 'rel': 0, 'iv_load_policy': 3,
                    'mute': (vol === 0 ? 1 : 0)
                },
                events: {
                    'onReady': (e) => {
                        e.target.setVolume(vol);
                        if (vol > 0) e.target.unMute();
                        e.target.playVideo();
                    },
                    'onStateChange': (e) => {
                        // 0 は動画終了の合図
                        if (e.data === 0) window.parent.postMessage('videoEnded', '*');
                    }
                }
            });
        };

       
        window.addEventListener('message', (event) => {
            // playerが準備できていない時は無視
            if (!player || typeof player.pauseVideo !== 'function') return;

            if (event.data === 'pause') {
                player.pauseVideo();
            } else if (event.data === 'play') {
                player.playVideo();
            }
        });
    </script>
</body>
</html>
